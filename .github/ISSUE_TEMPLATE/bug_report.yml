name: Bug report
description: Report a reproducible defect in Mistle.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please provide a concrete reproduction and expected behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and concisely.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide exact steps, sample input, URLs, or screenshots needed to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include commit SHA, deployment environment, browser, OS, and any relevant configuration details.
      placeholder: |
        - Mistle version / commit:
        - Environment:
        - Browser:
        - OS:
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add logs, stack traces, screenshots, or anything else that helps.
