name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect SEA packaging changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      sandbox_runtime_sea: ${{ steps.filter.outputs.sandbox_runtime_sea }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            sandbox_runtime_sea:
              - '.github/workflows/ci.yml'
              - '.github/workflows/ci-daily-integration.yml'
              - 'docker/sandbox-runtime-sea-check/**'
              - 'scripts/test/run-sandbox-runtime-sea-linux.mjs'
              - 'apps/sandbox-runtime-node/**'
              - 'packages/sandbox-rs-napi/**'
              - 'packages/integrations-core/**'
              - 'packages/integrations-definitions/**'
              - 'packages/codex-app-server-client/**'
              - 'packages/sandbox-session-client/**'
              - 'packages/sandbox-session-protocol/**'
              - 'packages/time/**'
              - 'apps/sandbox-runtime/images/base/Dockerfile'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'tsconfig.base.json'

  static:
    name: Format, Lint, Typecheck
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Restore pnpm store cache
        id: static-pnpm-store-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore Turbo local cache
        id: static-turbo-cache
        uses: actions/cache/restore@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies in Nix shell
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Save pnpm store cache
        if: steps.static-pnpm-store-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Generate CI config
        run: nix develop --command pnpm run config:init:ci

      - name: Build workspace in Nix shell
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: nix develop --command bash -lc "MISTLE_CONFIG_PATH=$GITHUB_WORKSPACE/config/config.ci.toml pnpm build"

      - name: Run static checks in Nix shell
        run: nix develop --command bash -lc "pnpm format:check && pnpm lint && pnpm typecheck"

      - name: Save Turbo local cache
        if: ${{ always() && !cancelled() && steps.static-turbo-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}

  test:
    name: Test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Restore pnpm store cache
        id: test-pnpm-store-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore Turbo local cache
        id: test-turbo-cache
        uses: actions/cache/restore@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies in Nix shell
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Save pnpm store cache
        if: steps.test-pnpm-store-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Generate CI config
        run: nix develop --command pnpm run config:init:ci

      - name: Run tests in Nix shell
        run: nix develop --command pnpm test

      - name: Save Turbo local cache
        if: ${{ always() && !cancelled() && steps.test-turbo-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}

  sandbox-runtime-sea-linux:
    name: Sandbox Runtime SEA (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - changes
    if: needs.changes.outputs.sandbox_runtime_sea == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Run Linux SEA packaging check
        run: node ./scripts/test/run-sandbox-runtime-sea-linux.mjs

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - changes
      - static
      - test
      - sandbox-runtime-sea-linux
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    env:
      GITHUB_TOKEN: ${{ github.token }}
      SEA_CHANGES_RESULT: ${{ needs.changes.result }}
      STATIC_RESULT: ${{ needs.static.result }}
      TEST_RESULT: ${{ needs.test.result }}
      SEA_RESULT: ${{ needs.sandbox-runtime-sea-linux.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      WORKFLOW_NAME: ${{ github.workflow }}

    steps:
      - name: Fetch Infisical secrets
        uses: Infisical/secrets-action@v1.0.11
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: mistle-oss
          env-slug: ci
          secret-path: /ci-shared

      - name: Post Slack notification
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          static_result = os.environ["STATIC_RESULT"]
          test_result = os.environ["TEST_RESULT"]
          sea_changes_result = os.environ["SEA_CHANGES_RESULT"]
          sea_result = os.environ["SEA_RESULT"]
          sea_ok = sea_result in {"success", "skipped"}
          if sea_changes_result == "cancelled":
              workflow_result = "cancelled"
          elif sea_changes_result != "success":
              workflow_result = "failure"
          elif static_result == "success" and test_result == "success" and sea_ok:
              workflow_result = "success"
          elif (
              static_result == "cancelled"
              or test_result == "cancelled"
              or sea_result == "cancelled"
          ):
              workflow_result = "cancelled"
          else:
              workflow_result = "failure"

          color_by_result = {
              "success": "#2eb886",
              "failure": "#e01e5a",
              "cancelled": "#ecb22e",
          }
          emoji_by_result = {
              "success": ":white_check_mark:",
              "failure": ":x:",
              "cancelled": ":white_circle:",
          }
          color = color_by_result.get(workflow_result, "#808080")
          emoji = emoji_by_result.get(workflow_result, ":grey_question:")
          pr_field = {
              "title": "Commit",
              "value": f"`{os.environ['GITHUB_SHA'][:7]}`",
              "short": False,
          }
          api_request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/commits/{os.environ['GITHUB_SHA']}/pulls",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="GET",
          )
          try:
              with urllib.request.urlopen(api_request) as response:
                  pull_requests = json.load(response)
          except urllib.error.HTTPError:
              pull_requests = []

          if pull_requests:
              pull_request = pull_requests[0]
              pr_field = {
                  "value": f"<{pull_request['html_url']}|#{pull_request['number']} {pull_request['title']}>",
                  "short": False,
              }

          payload = {
              "attachments": [
                  {
                      "color": color,
                      "title": "PR merged to main",
                      "title_link": os.environ["RUN_URL"],
                      "text": f"{emoji} CI run finished with result: {workflow_result}.",
                      "mrkdwn_in": ["text", "fields"],
                      "fields": [
                          pr_field,
                          {
                              "title": "Repository",
                              "value": os.environ["GITHUB_REPOSITORY"],
                              "short": True,
                          },
                      ],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 200:
                  raise RuntimeError(f"Slack webhook returned unexpected status {response.status}.")
          PY
