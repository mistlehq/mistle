name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies in Nix shell
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Generate CI config
        run: nix develop --command pnpm run config:init:ci

      - name: Build workspace in Nix shell
        run: nix develop --command bash -lc "MISTLE_CONFIG_PATH=$GITHUB_WORKSPACE/config/config.ci.toml pnpm build"

      - name: Run CI checks in Nix shell
        run: nix develop --command pnpm run ci
