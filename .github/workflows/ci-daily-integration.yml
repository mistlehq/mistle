name: Daily Integration

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: daily-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration:
    name: Daily Integration
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turbo local cache
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies in Nix shell
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Fetch Infisical secrets
        uses: Infisical/secrets-action@v1.0.11
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: mistle-integration-tests
          env-slug: ci

      - name: Run daily integration suite in Nix shell
        run: nix develop --command pnpm test:integration
