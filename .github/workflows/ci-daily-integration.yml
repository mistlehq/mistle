name: CI - Integration (Daily)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: daily-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration:
    name: Daily Integration
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Restore pnpm store cache
        id: pnpm-store-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore Turbo local cache
        id: turbo-cache
        uses: actions/cache/restore@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies in Nix shell
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Save pnpm store cache
        if: steps.pnpm-store-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Fetch Infisical secrets
        uses: Infisical/secrets-action@v1.0.11
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: mistle-oss
          env-slug: ci
          secret-path: /integration-tests

      - name: Generate integration config
        run: nix develop --command pnpm run config:init:integration

      - name: Run daily integration suite in Nix shell
        env:
          MISTLE_CONFIG_PATH: ${{ github.workspace }}/config/config.integration.docker.toml
        run: nix develop --command pnpm test:integration

      - name: Save Turbo local cache
        if: ${{ always() && !cancelled() && steps.turbo-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.sha }}

  sandbox-runtime-sea-linux:
    name: Sandbox Runtime SEA (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Run Linux SEA packaging check
        run: node ./scripts/test/run-sandbox-runtime-sea-linux.mjs

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - integration
      - sandbox-runtime-sea-linux
    if: always()
    env:
      INTEGRATION_RESULT: ${{ needs.integration.result }}
      SEA_RESULT: ${{ needs.sandbox-runtime-sea-linux.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      WORKFLOW_NAME: ${{ github.workflow }}

    steps:
      - name: Fetch Infisical secrets
        uses: Infisical/secrets-action@v1.0.11
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: mistle-oss
          env-slug: ci
          secret-path: /ci-shared

      - name: Post Slack notification
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          integration_result = os.environ["INTEGRATION_RESULT"]
          sea_result = os.environ["SEA_RESULT"]
          if integration_result == "success" and sea_result == "success":
              result = "success"
          elif integration_result == "cancelled" or sea_result == "cancelled":
              result = "cancelled"
          else:
              result = "failure"
          color_by_result = {
              "success": "#2eb886",
              "failure": "#e01e5a",
              "cancelled": "#ecb22e",
          }
          emoji_by_result = {
              "success": ":white_check_mark:",
              "failure": ":x:",
              "cancelled": ":warning:",
          }
          color = color_by_result.get(result, "#808080")
          emoji = emoji_by_result.get(result, ":grey_question:")
          payload = {
              "attachments": [
                  {
                      "color": color,
                      "title": os.environ["WORKFLOW_NAME"],
                      "title_link": os.environ["RUN_URL"],
                      "text": f"{emoji} Daily integration run finished with result: {result}.",
                      "fields": [
                          {
                              "title": "Repository",
                              "value": os.environ["GITHUB_REPOSITORY"],
                              "short": True,
                          },
                          {
                              "title": "Branch",
                              "value": os.environ["GITHUB_REF_NAME"],
                              "short": True,
                          },
                      ],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 200:
                  raise RuntimeError(f"Slack webhook returned unexpected status {response.status}.")
          PY
