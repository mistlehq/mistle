name: Publish Sandbox Base Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-sandbox-base.yml"
      - "apps/sandbox-runtime/**"
      - "packages/sandbox-rs-napi/**"
      - "packages/integrations-core/**"
      - "packages/integrations-definitions/**"
      - "packages/sandbox-session-client/**"
      - "packages/sandbox-session-protocol/**"
      - "packages/time/**"
      - "scripts/build/build-sandbox-runtime-sea-linux.mjs"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "tsconfig.base.json"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sandbox-base-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Sandbox Base Image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      IMAGE_REPOSITORY: ghcr.io/mistlehq/sandbox-base
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_LATEST_TAG: latest
      IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Build Linux SEA artifacts
        run: node ./scripts/build/build-sandbox-runtime-sea-linux.mjs

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build sandbox base image
        run: |
          docker build \
            --platform linux/amd64 \
            --target sandbox-base-prod \
            --file apps/sandbox-runtime/Dockerfile \
            --label "org.opencontainers.image.source=${IMAGE_SOURCE}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --tag "${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
            --tag "${IMAGE_REPOSITORY}:${IMAGE_LATEST_TAG}" \
            .

      - name: Push sandbox base image
        run: |
          docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${IMAGE_REPOSITORY}:${IMAGE_LATEST_TAG}"

      - name: Resolve pushed digest
        id: publish
        run: |
          image_ref="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REPOSITORY}:${IMAGE_TAG}")"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Summarize published image
        run: |
          {
            echo "## Published image"
            echo
            echo "- Tag: \`${IMAGE_REPOSITORY}:${IMAGE_TAG}\`"
            echo "- Alias: \`${IMAGE_REPOSITORY}:${IMAGE_LATEST_TAG}\`"
            echo "- Digest: \`${{ steps.publish.outputs.image_ref }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - publish
    if: always()
    permissions:
      contents: read
      id-token: write
    env:
      PUBLISH_RESULT: ${{ needs.publish.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      WORKFLOW_NAME: ${{ github.workflow }}

    steps:
      - name: Fetch Infisical secrets
        uses: Infisical/secrets-action@v1.0.11
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: mistle-oss
          env-slug: ci
          secret-path: /ci-shared

      - name: Post Slack notification
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          publish_result = os.environ["PUBLISH_RESULT"]
          color_by_result = {
              "success": "#2eb886",
              "failure": "#e01e5a",
              "cancelled": "#ecb22e",
          }
          emoji_by_result = {
              "success": ":white_check_mark:",
              "failure": ":x:",
              "cancelled": ":warning:",
          }
          color = color_by_result.get(publish_result, "#808080")
          emoji = emoji_by_result.get(publish_result, ":grey_question:")
          payload = {
              "attachments": [
                  {
                      "color": color,
                      "title": os.environ["WORKFLOW_NAME"],
                      "title_link": os.environ["RUN_URL"],
                      "text": f"{emoji} Sandbox base image publish finished with result: {publish_result}.",
                      "fields": [
                          {
                              "title": "Repository",
                              "value": os.environ["GITHUB_REPOSITORY"],
                              "short": True,
                          },
                          {
                              "title": "Branch",
                              "value": os.environ["GITHUB_REF_NAME"],
                              "short": True,
                          },
                      ],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 200:
                  raise RuntimeError(f"Slack webhook returned unexpected status {response.status}.")
          PY
