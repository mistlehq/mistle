[global]
env = "development"

[global.telemetry]
enabled = true
debug = false
resource_attributes = "deployment.environment=test"

[global.telemetry.traces]
endpoint = "http://127.0.0.1:4318/v1/traces"

[global.telemetry.logs]
endpoint = "http://127.0.0.1:4318/v1/logs"

[global.telemetry.metrics]
endpoint = "http://127.0.0.1:4318/v1/metrics"

[global.internal_auth]
service_token = "fixture-service-token"

[global.sandbox.connect]
token_secret = "fixture-connection-token-secret"
token_issuer = "control-plane-api"
token_audience = "data-plane-gateway"

[global.sandbox.bootstrap]
token_secret = "fixture-bootstrap-token-secret"
token_issuer = "data-plane-worker"
token_audience = "data-plane-gateway"

[global.sandbox.egress]
token_secret = "fixture-egress-token-secret"
token_issuer = "data-plane-worker"
token_audience = "tokenizer-proxy"

[global.sandbox]
provider = "docker"
default_base_image = "127.0.0.1:5001/mistle/sandbox-base:dev"
gateway_ws_url = "ws://127.0.0.1:5003/tunnel/sandbox"
internal_gateway_ws_url = "ws://127.0.0.1:5003/tunnel/sandbox"

[apps.control_plane_api.server]
host = "0.0.0.0"
port = 5100

[apps.control_plane_api.database]
url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"
migration_url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"

[apps.control_plane_api.auth]
base_url = "http://127.0.0.1:5000"
secret = "test-secret"
trusted_origins = ["http://127.0.0.1:3000"]
otp_length = 6
otp_expires_in_seconds = 300
otp_allowed_attempts = 3

[apps.control_plane_api.dashboard]
base_url = "http://127.0.0.1:5173"

[apps.control_plane_api.workflow]
database_url = "postgresql://mistle:mistle@127.0.0.1:6432/mistle"
namespace_id = "fixture"

[apps.control_plane_api.data_plane_api]
base_url = "http://127.0.0.1:5300"

[apps.control_plane_api.integrations]
active_master_encryption_key_version = 2

[apps.control_plane_api.integrations.master_encryption_keys]
"2" = "integration-master-key-fixture"

[apps.control_plane_worker.workflow]
database_url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"
namespace_id = "fixture"
run_migrations = true
concurrency = 2

[apps.control_plane_worker.email]
from_address = "no-reply@mistle.local"
from_name = "Mistle Local"
smtp_host = "127.0.0.1"
smtp_port = 1025
smtp_secure = false
smtp_username = "mailpit"
smtp_password = "mailpit"

[apps.control_plane_worker.data_plane_api]
base_url = "http://127.0.0.1:5300"

[apps.control_plane_worker.control_plane_api]
base_url = "http://127.0.0.1:5100"

[apps.data_plane_api.server]
host = "0.0.0.0"
port = 5300

[apps.data_plane_api.database]
url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"
migration_url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"

[apps.data_plane_api.workflow]
database_url = "postgresql://mistle:mistle@127.0.0.1:6432/mistle"
namespace_id = "fixture"

[apps.data_plane_api.runtime_state]
gateway_base_url = "http://127.0.0.1:5302"

[apps.data_plane_api.sandbox.docker]
socket_path = "/var/run/docker.sock"

[apps.data_plane_gateway.server]
host = "0.0.0.0"
port = 5302

[apps.data_plane_gateway.database]
url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"

[apps.data_plane_gateway.runtime_state]
backend = "valkey"

[apps.data_plane_gateway.runtime_state.valkey]
url = "redis://127.0.0.1:6379"
key_prefix = "mistle:runtime-state:fixture"

[apps.data_plane_gateway.data_plane_api]
base_url = "http://127.0.0.1:5300"

[apps.data_plane_worker.database]
url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"

[apps.data_plane_worker.workflow]
database_url = "postgresql://mistle:mistle@127.0.0.1:6432/mistle"
namespace_id = "fixture"
run_migrations = true
concurrency = 2

[apps.data_plane_worker.tunnel]
bootstrap_token_ttl_seconds = 120
exchange_token_ttl_seconds = 3600

[apps.data_plane_worker.runtime_state]
gateway_base_url = "http://127.0.0.1:5302"

[apps.data_plane_worker.sandbox]
tokenizer_proxy_egress_base_url = "http://127.0.0.1:5004/tokenizer-proxy/egress"

[apps.data_plane_worker.sandbox.docker]
socket_path = "/var/run/docker.sock"
network_name = "mistle-sandbox-dev"
traces_endpoint = "http://otel-lgtm:4318/v1/traces"

[apps.tokenizer_proxy.server]
host = "0.0.0.0"
port = 5305

[apps.tokenizer_proxy.control_plane_api]
base_url = "http://127.0.0.1:5100"
