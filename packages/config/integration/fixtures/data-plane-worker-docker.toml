[global]
env = "development"

[global.telemetry]
enabled = true
debug = false
resource_attributes = "deployment.environment=test"

[global.telemetry.traces]
endpoint = "http://127.0.0.1:4318/v1/traces"

[global.telemetry.logs]
endpoint = "http://127.0.0.1:4318/v1/logs"

[global.telemetry.metrics]
endpoint = "http://127.0.0.1:4318/v1/metrics"

[global.internal_auth]
service_token = "fixture-service-token"

[global.sandbox.connect]
token_secret = "fixture-connection-token-secret"
token_issuer = "control-plane-api"
token_audience = "data-plane-gateway"

[global.sandbox.bootstrap]
token_secret = "fixture-bootstrap-token-secret"
token_issuer = "data-plane-worker"
token_audience = "data-plane-gateway"

[global.sandbox]
provider = "docker"
default_base_image = "127.0.0.1:5001/mistle/sandbox-base:dev"
gateway_ws_url = "ws://127.0.0.1:5003/tunnel/sandbox"
internal_gateway_ws_url = "ws://host.docker.internal:5003/tunnel/sandbox"

[apps.data_plane_worker.database]
url = "postgresql://mistle:mistle@127.0.0.1:5432/mistle"

[apps.data_plane_worker.workflow]
database_url = "postgresql://mistle:mistle@127.0.0.1:6432/mistle"
namespace_id = "fixture-docker"
run_migrations = true
concurrency = 3

[apps.data_plane_worker.tunnel]
bootstrap_token_ttl_seconds = 120
exchange_token_ttl_seconds = 3600

[apps.data_plane_worker.runtime_state]
gateway_base_url = "http://127.0.0.1:5003"

[apps.data_plane_worker.sandbox]
tokenizer_proxy_egress_base_url = "http://127.0.0.1:5004/tokenizer-proxy/egress"

[apps.data_plane_worker.sandbox.docker]
socket_path = "/var/run/docker.sock"
network_name = "mistle-sandbox-dev"
traces_endpoint = "http://otel-lgtm:4318/v1/traces"
