[package]
name = "sandbox-rs-napi"
version = "0.0.0"
edition = "2024"
build = "build.rs"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.8.3", features = ["napi10"] }
napi-derive = "3.5.2"
nix = { version = "0.31.2", features = ["process", "signal", "user"] }
portable-pty = "0.9.0"
rcgen = "0.13.2"

[build-dependencies]
napi-build = "2.3.1"
