server {
  listen 5205;
  server_name _;

  location /tokenizer-proxy/egress/ {
    proxy_http_version 1.1;
    proxy_set_header Host host.docker.internal:5205;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://host.docker.internal:5205/tokenizer-proxy/egress/;
  }
}
