name: mistle-local-edge

services:
  edge:
    image: caddy:2.10.2
    ports:
      - "${EDGE_PORT:-8088}:8088"
    environment:
      DATA_PLANE_API_UPSTREAM: "${DATA_PLANE_API_UPSTREAM:-host.docker.internal:3000}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
