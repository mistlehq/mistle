name: mistle-local-dev

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-mistle_dev}"
      POSTGRES_USER: "${POSTGRES_USER:-mistle}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mistle}"
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - mistle_local_postgres_data:/var/lib/postgresql

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB:-mistle_dev}"
      DB_USER: "${POSTGRES_USER:-mistle}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-mistle}"
      AUTH_TYPE: plain
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MAX_CLIENT_CONN: "100"
    ports:
      - "${DEV_PGBOUNCER_PORT:-6432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - PGPASSWORD="$$DB_PASSWORD" psql "postgresql://$$DB_USER:$$DB_PASSWORD@127.0.0.1:5432/$$DB_NAME" -tAc "select 1"
      interval: 2s
      timeout: 2s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.28
    ports:
      - "${DEV_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${DEV_MAILPIT_UI_PORT:-8025}:8025"

  registry:
    image: registry:3
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    ports:
      - "${DEV_REGISTRY_PORT:-5001}:5000"
    volumes:
      - mistle_local_registry_data:/var/lib/registry

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "${DEV_OTEL_GRAFANA_PORT:-3000}:3000"
      - "${DEV_OTEL_OTLP_GRPC_PORT:-4317}:4317"
      - "${DEV_OTEL_OTLP_HTTP_PORT:-4318}:4318"
    networks:
      - sandbox-dev

  valkey:
    image: valkey/valkey:9.0-alpine
    ports:
      - "${DEV_VALKEY_PORT:-6379}:6379"
    networks:
      - sandbox-dev

  tokenizer-proxy-relay:
    image: nginx:1.27-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./tokenizer-proxy-relay.nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - sandbox-dev

  data-plane-gateway-relay:
    image: nginx:1.27-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./data-plane-gateway-relay.nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - sandbox-dev

  tunnel:
    image: "${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}"
    volumes:
      - "${CLOUDFLARED_CONFIG_PATH:-./.generated/cloudflared-config.yml}:/etc/cloudflared/config.yml:ro"
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
      - --token
      - "${CLOUDFLARE_TUNNEL_TOKEN:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mistle_local_postgres_data:
  mistle_local_registry_data:

networks:
  sandbox-dev:
    name: mistle-sandbox-dev
