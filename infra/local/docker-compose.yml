name: mistle-local-dev

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-mistle_dev}"
      POSTGRES_USER: "${POSTGRES_USER:-mistle}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mistle}"
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - mistle_local_postgres_data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB:-mistle_dev}"
      DB_USER: "${POSTGRES_USER:-mistle}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-mistle}"
      AUTH_TYPE: plain
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MAX_CLIENT_CONN: "100"
    ports:
      - "${DEV_PGBOUNCER_PORT:-6432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - PGPASSWORD="$$DB_PASSWORD" psql "postgresql://$$DB_USER:$$DB_PASSWORD@127.0.0.1:5432/$$DB_NAME" -tAc "select 1"
      interval: 2s
      timeout: 2s
      retries: 30

  edge:
    image: caddy:2.11
    ports:
      - "${EDGE_PORT:-8088}:8088"
    environment:
      DATA_PLANE_API_UPSTREAM: "${DATA_PLANE_API_UPSTREAM:-host.docker.internal:5200}"
      SERVICE_TOKEN: "${SERVICE_TOKEN:?SERVICE_TOKEN is required}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mailpit:
    image: axllent/mailpit:v1.28
    ports:
      - "${DEV_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${DEV_MAILPIT_UI_PORT:-8025}:8025"

  tunnel:
    image: "${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}"
    volumes:
      - "${CLOUDFLARED_CONFIG_PATH:?CLOUDFLARED_CONFIG_PATH is required}:/etc/cloudflared/config.yml:ro"
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
      - --token
      - "${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}"
    depends_on:
      edge:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mistle_local_postgres_data:
