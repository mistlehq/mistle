name: mistle-local-dev

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-mistle_control_plane}"
      POSTGRES_USER: "${POSTGRES_USER:-mistle}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mistle}"
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - mistle_local_postgres_data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB:-mistle_control_plane}"
      DB_USER: "${POSTGRES_USER:-mistle}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-mistle}"
      AUTH_TYPE: plain
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MAX_CLIENT_CONN: "100"
    ports:
      - "${DEV_PGBOUNCER_PORT:-6432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - PGPASSWORD="$$DB_PASSWORD" psql "postgresql://$$DB_USER:$$DB_PASSWORD@127.0.0.1:5432/$$DB_NAME" -tAc "select 1"
      interval: 2s
      timeout: 2s
      retries: 30

  edge:
    image: caddy:2.11
    ports:
      - "${EDGE_PORT:-8088}:8088"
    environment:
      DATA_PLANE_API_UPSTREAM: "${DATA_PLANE_API_UPSTREAM:-host.docker.internal:3000}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tunnel-control-plane-api:
    image: "${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}"
    command: tunnel --no-autoupdate --url "http://host.docker.internal:${CONTROL_PLANE_API_LOCAL_PORT:-5000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tunnel-data-plane-edge:
    image: "${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}"
    command: tunnel --no-autoupdate --url "http://host.docker.internal:${EDGE_PORT:-8088}"
    depends_on:
      edge:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mistle_local_postgres_data:
