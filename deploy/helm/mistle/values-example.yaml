      value: "587"
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_SMTP_SECURE
      value: "false"
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_DATA_PLANE_API_BASE_URL
      value: http://mistle-data-plane-api:8082
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_CONTROL_PLANE_API_BASE_URL
      value: http://mistle-control-plane-api:8080
  secretEnv:
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_WORKFLOW_DATABASE_URL
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_WORKER_WORKFLOW_DATABASE_URL
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_SMTP_USERNAME
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_WORKER_SMTP_USERNAME
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_SMTP_PASSWORD
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_WORKER_SMTP_PASSWORD

