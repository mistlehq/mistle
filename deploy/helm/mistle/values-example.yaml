      value: http://otel-collector:4318/v1/logs
    - name: MISTLE_GLOBAL_TELEMETRY_METRICS_ENDPOINT
      value: http://otel-collector:4318/v1/metrics
    - name: MISTLE_GLOBAL_TELEMETRY_RESOURCE_ATTRIBUTES
      value: deployment.environment=production
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_WORKFLOW_NAMESPACE_ID
      value: production
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_WORKFLOW_RUN_MIGRATIONS
      value: "true"
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_WORKFLOW_CONCURRENCY
      value: "4"
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_EMAIL_FROM_ADDRESS
      value: no-reply@example.com
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_EMAIL_FROM_NAME
      value: Mistle
    - name: MISTLE_APPS_CONTROL_PLANE_WORKER_SMTP_HOST
