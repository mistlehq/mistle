global:
  namespaceOverride: mistle
  imageRegistry: ghcr.io/mistlehq

controlPlaneApi:
  image:
    repository: control-plane-api
    digest: sha256:replace-with-control-plane-api-digest
  ingress:
    enabled: true
    className: nginx
    host: api.example.com
  env:
    - name: NODE_ENV
      value: production
    - name: MISTLE_GLOBAL_TELEMETRY_ENABLED
      value: "true"
    - name: MISTLE_GLOBAL_TELEMETRY_DEBUG
      value: "false"
    - name: MISTLE_GLOBAL_TELEMETRY_TRACES_ENDPOINT
      value: http://otel-collector:4318/v1/traces
    - name: MISTLE_GLOBAL_TELEMETRY_LOGS_ENDPOINT
      value: http://otel-collector:4318/v1/logs
    - name: MISTLE_GLOBAL_TELEMETRY_METRICS_ENDPOINT
      value: http://otel-collector:4318/v1/metrics
    - name: MISTLE_GLOBAL_TELEMETRY_RESOURCE_ATTRIBUTES
      value: deployment.environment=production
    - name: MISTLE_GLOBAL_SANDBOX_PROVIDER
      value: docker
    - name: MISTLE_GLOBAL_SANDBOX_DEFAULT_BASE_IMAGE
      value: ghcr.io/mistlehq/sandbox-base:0123456789abcdef
    - name: MISTLE_GLOBAL_SANDBOX_GATEWAY_WS_URL
      value: wss://gateway.example.com/tunnel/sandbox
    - name: MISTLE_GLOBAL_SANDBOX_INTERNAL_GATEWAY_WS_URL
      value: ws://mistle-data-plane-gateway:8084/tunnel/sandbox
    - name: MISTLE_GLOBAL_SANDBOX_CONNECT_TOKEN_ISSUER
      value: control-plane-api
    - name: MISTLE_GLOBAL_SANDBOX_CONNECT_TOKEN_AUDIENCE
      value: data-plane-gateway
    - name: MISTLE_GLOBAL_SANDBOX_BOOTSTRAP_TOKEN_ISSUER
      value: data-plane-worker
    - name: MISTLE_GLOBAL_SANDBOX_BOOTSTRAP_TOKEN_AUDIENCE
      value: data-plane-gateway
    - name: MISTLE_APPS_CONTROL_PLANE_API_HOST
      value: 0.0.0.0
    - name: MISTLE_APPS_CONTROL_PLANE_API_PORT
      value: "8080"
    - name: MISTLE_APPS_CONTROL_PLANE_API_AUTH_BASE_URL
      value: https://api.example.com
    - name: MISTLE_APPS_CONTROL_PLANE_API_DASHBOARD_BASE_URL
      value: https://app.example.com
    - name: MISTLE_APPS_CONTROL_PLANE_API_AUTH_TRUSTED_ORIGINS
      value: https://app.example.com
    - name: MISTLE_APPS_CONTROL_PLANE_API_AUTH_OTP_LENGTH
      value: "6"
    - name: MISTLE_APPS_CONTROL_PLANE_API_AUTH_OTP_EXPIRES_IN_SECONDS
      value: "300"
    - name: MISTLE_APPS_CONTROL_PLANE_API_AUTH_OTP_ALLOWED_ATTEMPTS
      value: "3"
    - name: MISTLE_APPS_CONTROL_PLANE_API_WORKFLOW_NAMESPACE_ID
      value: production
    - name: MISTLE_APPS_CONTROL_PLANE_API_DATA_PLANE_API_BASE_URL
      value: http://mistle-data-plane-api:8082
    - name: MISTLE_APPS_CONTROL_PLANE_API_INTEGRATIONS_ACTIVE_MASTER_ENCRYPTION_KEY_VERSION
      value: "1"
  secretEnv:
    - name: MISTLE_GLOBAL_INTERNAL_AUTH_SERVICE_TOKEN
      secretName: mistle-runtime
      secretKey: MISTLE_GLOBAL_INTERNAL_AUTH_SERVICE_TOKEN
    - name: MISTLE_GLOBAL_SANDBOX_CONNECT_TOKEN_SECRET
      secretName: mistle-runtime
      secretKey: MISTLE_GLOBAL_SANDBOX_CONNECT_TOKEN_SECRET
    - name: MISTLE_GLOBAL_SANDBOX_BOOTSTRAP_TOKEN_SECRET
      secretName: mistle-runtime
      secretKey: MISTLE_GLOBAL_SANDBOX_BOOTSTRAP_TOKEN_SECRET
    - name: MISTLE_APPS_CONTROL_PLANE_API_DATABASE_URL
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_API_DATABASE_URL
    - name: MISTLE_APPS_CONTROL_PLANE_API_DATABASE_MIGRATION_URL
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_API_DATABASE_MIGRATION_URL
    - name: MISTLE_APPS_CONTROL_PLANE_API_WORKFLOW_DATABASE_URL
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_API_WORKFLOW_DATABASE_URL
    - name: MISTLE_APPS_CONTROL_PLANE_API_AUTH_SECRET
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_API_AUTH_SECRET
    - name: MISTLE_APPS_CONTROL_PLANE_API_INTEGRATIONS_MASTER_ENCRYPTION_KEYS_JSON
      secretName: mistle-runtime
      secretKey: MISTLE_APPS_CONTROL_PLANE_API_INTEGRATIONS_MASTER_ENCRYPTION_KEYS_JSON

controlPlaneWorker:
  image:
    repository: control-plane-worker
    digest: sha256:replace-with-control-plane-worker-digest
  env:
    - name: NODE_ENV
      value: production
    - name: MISTLE_GLOBAL_TELEMETRY_ENABLED
      value: "true"
    - name: MISTLE_GLOBAL_TELEMETRY_DEBUG
      value: "false"
    - name: MISTLE_GLOBAL_TELEMETRY_TRACES_ENDPOINT
      value: http://otel-collector:4318/v1/traces
