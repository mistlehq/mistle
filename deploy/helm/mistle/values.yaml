    pullPolicy: IfNotPresent
    useGlobalRegistry: true
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    path: /
    pathType: Prefix
