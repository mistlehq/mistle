[changelog]
header = """
# Changelog
"""

body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [unreleased]
{%- endif %}
{%- for group, commits in commits | group_by(attribute="group") %}

### {{ group | striptags | trim }}
{%- for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[breaking] {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor -%}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = true
sort_commits = "oldest"
topo_order = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+(?:-alpha\\.[0-9]+)?$"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactors" },
  { message = "^perf", group = "<!-- 3 -->Performance" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^build", group = "<!-- 6 -->Build" },
  { message = "^ci", group = "<!-- 7 -->CI" },
  { message = "^chore", group = "<!-- 8 -->Chores" },
  { message = "^deps", group = "<!-- 9 -->Dependencies" },
]
