pre-commit:
  parallel: false
  commands:
    lint-staged:
      run: pnpm lint-staged

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
