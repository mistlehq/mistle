# Full reference of config keys (current set).
# This sample is production-centric.

[global]
env = "production"

[global.internal_auth]
service_token = "replace-with-internal-service-token"

[global.tunnel]
bootstrap_token_secret = "replace-with-bootstrap-token-secret"
token_issuer = "data-plane-worker"
token_audience = "data-plane-gateway"

[apps.control_plane_api.server]
host = "0.0.0.0"
port = 8080

[apps.control_plane_api.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.control_plane_api.auth]
base_url = "https://api.mistle.example"
invitation_accept_base_url = "https://app.mistle.example/invitations/accept"
secret = "replace-with-strong-secret"
trusted_origins = ["https://app.mistle.example"]
otp_length = 6
otp_expires_in_seconds = 300
otp_allowed_attempts = 3

[apps.control_plane_api.workflow]
database_url = "postgresql://mistle:replace-with-password@db:6432/mistle"
namespace_id = "production"

[apps.control_plane_api.sandbox]
default_base_image = "registry.example.com/mistle/sandbox-base:prod"

[apps.control_plane_worker.server]
host = "0.0.0.0"
port = 8081

[apps.control_plane_worker.workflow]
database_url = "postgresql://mistle:replace-with-password@db:5432/mistle"
namespace_id = "production"
run_migrations = true
concurrency = 4

[apps.control_plane_worker.email]
from_address = "no-reply@mistle.example"
from_name = "Mistle"
smtp_host = "smtp.mistle.example"
smtp_port = 587
smtp_secure = false
smtp_username = "replace-with-smtp-username"
smtp_password = "replace-with-smtp-password"

[apps.control_plane_worker.data_plane_api]
base_url = "http://data-plane-api:8082"

[apps.data_plane_api.server]
host = "0.0.0.0"
port = 8082

[apps.data_plane_api.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.data_plane_api.workflow]
database_url = "postgresql://mistle:replace-with-password@db:6432/mistle"
namespace_id = "production"

[apps.data_plane_gateway.server]
host = "0.0.0.0"
port = 8084

[apps.data_plane_worker.server]
host = "0.0.0.0"
port = 8083

[apps.data_plane_worker.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.data_plane_worker.workflow]
database_url = "postgresql://mistle:replace-with-password@db:5432/mistle"
namespace_id = "production"
run_migrations = true
concurrency = 4

[apps.data_plane_worker.tunnel]
gateway_ws_url = "wss://gateway.mistle.example/tunnel/sandbox"
bootstrap_token_ttl_seconds = 120

[apps.data_plane_worker.sandbox]
provider = "modal"

[apps.data_plane_worker.sandbox.modal]
token_id = "replace-with-modal-token-id"
token_secret = "replace-with-modal-token-secret"
app_name = "mistle-sandbox"
environment_name = "production"

# For docker provider, set `provider = "docker"` above and configure:
#
# [apps.data_plane_worker.sandbox.docker]
# socket_path = "/var/run/docker.sock"
# snapshot_repository = "registry.example.com/mistle/snapshots"

[apps.dashboard]
control_plane_api_origin = "https://api.mistle.example"
