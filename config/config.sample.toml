# Full reference of config keys (current set).
# This sample is production-centric.

[global]
env = "production"

[global.internal_auth]
service_token = "replace-with-internal-service-token"

[apps.control_plane_api.server]
host = "0.0.0.0"
port = 8080

[apps.control_plane_api.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle_control_plane"

[apps.control_plane_api.auth]
base_url = "https://api.mistle.example"
secret = "replace-with-strong-secret"
trusted_origins = ["https://app.mistle.example"]
otp_length = 6
otp_expires_in_seconds = 300
otp_allowed_attempts = 3

[apps.control_plane_api.workflow]
database_url = "postgresql://mistle:replace-with-password@db:6432/mistle_control_plane"
namespace_id = "production"

[apps.control_plane_worker.server]
host = "0.0.0.0"
port = 8081

[apps.control_plane_worker.workflow]
database_url = "postgresql://mistle:replace-with-password@db:5432/mistle_control_plane"
namespace_id = "production"
run_migrations = true
concurrency = 4

[apps.control_plane_worker.email]
from_address = "no-reply@mistle.example"
from_name = "Mistle"
smtp_host = "smtp.mistle.example"
smtp_port = 587
smtp_secure = false
smtp_username = "replace-with-smtp-username"
smtp_password = "replace-with-smtp-password"

[apps.data_plane_api.server]
host = "0.0.0.0"
port = 8082

[apps.data_plane_api.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle_data_plane"

[apps.data_plane_api.workflow]
database_url = "postgresql://mistle:replace-with-password@db:6432/mistle_data_plane"
namespace_id = "production"

[apps.data_plane_gateway.server]
host = "0.0.0.0"
port = 8084

[apps.data_plane_worker.server]
host = "0.0.0.0"
port = 8083

[apps.data_plane_worker.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle_data_plane"

[apps.data_plane_worker.workflow]
database_url = "postgresql://mistle:replace-with-password@db:5432/mistle_data_plane"
namespace_id = "production"
run_migrations = true
concurrency = 4

[apps.dashboard]
control_plane_api_origin = "https://api.mistle.example"
