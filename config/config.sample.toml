# Full reference of config keys (current set).
# This sample is production-centric.

[global]
env = "production"

[global.telemetry]
enabled = true
debug = false
resource_attributes = "deployment.environment=production"

[global.telemetry.traces]
endpoint = "http://otel-collector:4318/v1/traces"

[global.telemetry.logs]
endpoint = "http://otel-collector:4318/v1/logs"

[global.telemetry.metrics]
endpoint = "http://otel-collector:4318/v1/metrics"

[global.internal_auth]
service_token = "replace-with-internal-service-token"

[global.sandbox.connect]
token_secret = "replace-with-connect-token-secret"
token_issuer = "control-plane-api"
token_audience = "data-plane-gateway"

[global.sandbox.bootstrap]
token_secret = "replace-with-bootstrap-token-secret"
token_issuer = "data-plane-worker"
token_audience = "data-plane-gateway"

[global.sandbox]
provider = "modal"
default_base_image = "registry.example.com/mistle/sandbox-base:prod"
gateway_ws_url = "wss://gateway.mistle.example/tunnel/sandbox"
internal_gateway_ws_url = "ws://data-plane-gateway:8084/tunnel/sandbox"

[apps.control_plane_api.server]
host = "0.0.0.0"
port = 8080

[apps.control_plane_api.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.control_plane_api.auth]
base_url = "https://api.mistle.example"
secret = "replace-with-strong-secret"
trusted_origins = ["https://app.mistle.example"]
otp_length = 6
otp_expires_in_seconds = 300
otp_allowed_attempts = 3

[apps.control_plane_api.dashboard]
base_url = "https://app.mistle.example"

[apps.control_plane_api.workflow]
database_url = "postgresql://mistle:replace-with-password@db:6432/mistle"
namespace_id = "production"

[apps.control_plane_api.data_plane_api]
base_url = "http://data-plane-api:8082"

[apps.control_plane_api.integrations]
active_master_encryption_key_version = 1

[apps.control_plane_api.integrations.master_encryption_keys]
"1" = "replace-with-master-encryption-key"

[apps.control_plane_worker.workflow]
database_url = "postgresql://mistle:replace-with-password@db:5432/mistle"
namespace_id = "production"
run_migrations = true
concurrency = 4

[apps.control_plane_worker.email]
from_address = "no-reply@mistle.example"
from_name = "Mistle"
smtp_host = "smtp.mistle.example"
smtp_port = 587
smtp_secure = false
smtp_username = "replace-with-smtp-username"
smtp_password = "replace-with-smtp-password"

[apps.control_plane_worker.data_plane_api]
base_url = "http://data-plane-api:8082"

[apps.control_plane_worker.control_plane_api]
base_url = "http://control-plane-api:8080"

[apps.data_plane_api.server]
host = "0.0.0.0"
port = 8082

[apps.data_plane_api.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.data_plane_api.workflow]
database_url = "postgresql://mistle:replace-with-password@db:6432/mistle"
namespace_id = "production"

[apps.data_plane_api.runtime_state]
gateway_base_url = "http://data-plane-gateway:8084"

[apps.data_plane_gateway.server]
host = "0.0.0.0"
port = 8084

[apps.data_plane_gateway.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.data_plane_gateway.runtime_state]
backend = "valkey"

[apps.data_plane_gateway.runtime_state.valkey]
url = "redis://valkey:6379"
key_prefix = "mistle:runtime-state"

[apps.data_plane_gateway.data_plane_api]
base_url = "http://data-plane-api:8082"

[apps.data_plane_worker.database]
url = "postgresql://mistle:replace-with-password@db:5432/mistle"

[apps.data_plane_worker.workflow]
database_url = "postgresql://mistle:replace-with-password@db:5432/mistle"
namespace_id = "production"
run_migrations = true
concurrency = 4

[apps.data_plane_worker.tunnel]
bootstrap_token_ttl_seconds = 120
exchange_token_ttl_seconds = 3600

[apps.data_plane_worker.runtime_state]
gateway_base_url = "http://data-plane-gateway:8084"

[apps.data_plane_worker.sandbox]
tokenizer_proxy_egress_base_url = "https://api.mistle.example/tokenizer-proxy/egress"

[apps.data_plane_worker.sandbox.modal]
token_id = "replace-with-modal-token-id"
token_secret = "replace-with-modal-token-secret"
app_name = "mistle-sandbox"
environment_name = "production"

# For the global docker provider, set `[global.sandbox].provider = "docker"` above and configure:
#
# [apps.data_plane_worker.sandbox.docker]
# socket_path = "/var/run/docker.sock"

[apps.tokenizer_proxy.server]
host = "0.0.0.0"
port = 8085

[apps.tokenizer_proxy.control_plane_api]
base_url = "http://control-plane-api:8080"

[apps.dashboard]
control_plane_api_origin = "https://api.mistle.example"
